[project]
name = "atlas"
version = "0.1.0"
description = "Minimal single-tenant ontology engine on Postgres."
requires-python = ">=3.12"
dependencies = [
    "psycopg[binary]>=3.1",
    "pgvector>=0.2",
    "pydantic>=2",
    "jsonschema>=4",
    "msgpack>=1.0",
    "pycountry>=23.0",
    "pyzipcode>=3.0",
    "usaddress>=0.5",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["atlas"]
package-dir = {atlas = "."}
package-data = {atlas = ["*.sql"]}
